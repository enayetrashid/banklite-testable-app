<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banklite API Frontend Demo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page">
        <h1>Banklite API Frontend Demo</h1>
        <p class="subtitle">Browser (Frontend JS) → API Layer (Backend) → Service Layer → Database-style Storage</p>

        <div class="nav-links">
            <a href="{{ url_for('web.login_page') }}">Login</a>
            <a href="{{ url_for('web.dashboard_page') }}">Dashboard</a>
            <a href="{{ url_for('web.deposit_page') }}">Deposit</a>
            <a href="{{ url_for('web.withdraw_page') }}">Withdraw</a>
            <a href="#" id="logout-link">Logout</a>
        </div>

        <div id="message-box"></div>
        {% block content %}{% endblock %}
    </div>
    <script src="{{ url_for('static', filename='js/api_client.js') }}"></script>
    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
